services:
  - type: web
    name: frontend
    buildCommand: cd frontend && pnpm install && pnpm build
    publishDirectory: frontend/dist
    routes:
      - type: rewrite
        source: /**
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
      - path: /**
        name: Cache-Control
        value: "public, max-age=0, must-revalidate"